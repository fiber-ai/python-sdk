name: Auto-generate SDK on backend deploy

on:
  repository_dispatch:
    types: [backend-updated]
  workflow_dispatch: # Manual trigger fallback

concurrency:
  group: sdk-generate
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SDK_DEPLOY_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openapi-python-client

      - name: Download latest OpenAPI spec
        run: curl -sf https://api.fiber.ai/openapi.json -o openapi.json

      - name: Clear old generated code
        run: |
          rm -rf src/fiberai/api src/fiberai/models \
                 src/fiberai/client.py src/fiberai/errors.py \
                 src/fiberai/types.py src/fiberai/__init__.py

      - name: Generate SDK from OpenAPI spec
        run: |
          openapi-python-client generate \
            --path openapi.json \
            --config config.yaml \
            --meta none \
            --output-path src/fiberai \
            --overwrite

      - name: Check if generated code changed
        id: diff
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in generated SDK"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in generated SDK"
          fi

      - name: Bump patch version
        if: steps.diff.outputs.changed == 'true'
        run: |
          VERSION=$(python3 << 'PYEOF'
          import re
          with open("pyproject.toml", "r") as f:
              content = f.read()
          match = re.search(r'version = "(\d+)\.(\d+)\.(\d+)"', content)
          major, minor, patch = match.groups()
          new_ver = f"{major}.{minor}.{int(patch)+1}"
          content = content.replace(
              f'version = "{major}.{minor}.{patch}"',
              f'version = "{new_ver}"',
              1
          )
          with open("pyproject.toml", "w") as f:
              f.write(content)
          print(new_ver)
          PYEOF
          )
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          BACKEND_SHA="${{ github.event.client_payload.sha }}"
          git commit -m "chore: auto-generate SDK v${VERSION}${BACKEND_SHA:+ (backend ${BACKEND_SHA:0:7})}"
          git push

      - name: Summary
        if: steps.diff.outputs.changed == 'true'
        run: |
          echo "### Pushed fiberai==${VERSION} — publish will be handled by publish.yml" >> $GITHUB_STEP_SUMMARY

      - name: Summary (no changes)
        if: steps.diff.outputs.changed == 'false'
        run: echo "### No spec changes detected - skipped" >> $GITHUB_STEP_SUMMARY
